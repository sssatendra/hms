version: '3.9'

services:
  # ─── Databases ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: hms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hms_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hms_pass}
      POSTGRES_DB: ${POSTGRES_DB:-hms_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hms_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hms_network

  mongodb:
    image: mongo:7-jammy
    container_name: hms_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-hms_user}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-hms_pass}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-hms_emr}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hms_network

  redis:
    image: redis:7-alpine
    container_name: hms_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-hms_redis_pass} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-hms_redis_pass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hms_network

  # ─── Object Storage ──────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: hms_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-hms_minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-hms_minio_pass}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - hms_network

  # ─── Backend Services ─────────────────────────────────────────
  backend-core:
    build:
      context: ./backend-core
      dockerfile: Dockerfile
    container_name: hms_backend_core
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-hms_user}:${POSTGRES_PASSWORD:-hms_pass}@postgres:5432/${POSTGRES_DB:-hms_db}
      MONGODB_URI: mongodb://${MONGO_USER:-hms_user}:${MONGO_PASSWORD:-hms_pass}@mongodb:27017/${MONGO_DB:-hms_emr}?authSource=admin
      REDIS_URL: redis://:${REDIS_PASSWORD:-hms_redis_pass}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-super_secret_jwt_key_change_in_production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-super_secret_refresh_key}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      LAB_SERVICE_URL: http://backend-lab:8000
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend-core/src:/app/src
    networks:
      - hms_network

  backend-lab:
    build:
      context: ./backend-lab
      dockerfile: Dockerfile
    container_name: hms_backend_lab
    restart: unless-stopped
    environment:
      PORT: 8000
      POSTGRES_DSN: postgresql+asyncpg://${POSTGRES_USER:-hms_user}:${POSTGRES_PASSWORD:-hms_pass}@postgres:5432/${POSTGRES_DB:-hms_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-hms_redis_pass}@redis:6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-hms_minio_admin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-hms_minio_pass}
      MINIO_BUCKET_LAB: hms-lab-files
      MINIO_BUCKET_DICOM: hms-dicom-files
      MINIO_SECURE: "false"
      JWT_SECRET: ${JWT_SECRET:-super_secret_jwt_key_change_in_production}
      CORE_SERVICE_URL: http://backend-core:4000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - hms_network

  # ─── Frontend ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_CORE_API_URL: ${NEXT_PUBLIC_CORE_API_URL:-http://localhost:4000/api/v1}
        NEXT_PUBLIC_LAB_API_URL: ${NEXT_PUBLIC_LAB_API_URL:-http://localhost:8000/api/v1}
    container_name: hms_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_CORE_API_URL: ${NEXT_PUBLIC_CORE_API_URL:-http://localhost:4000/api/v1}
      NEXT_PUBLIC_LAB_API_URL: ${NEXT_PUBLIC_LAB_API_URL:-http://localhost:8000/api/v1}
    ports:
      - "3000:3000"
    depends_on:
      - backend-core
      - backend-lab
    networks:
      - hms_network

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  minio_data:

networks:
  hms_network:
    driver: bridge
